<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f0d0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>LiveNew</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0d0a;
      --card: #161412;
      --field: #1c1a17;
      --gold: #c4a86c;
      --gold-dim: rgba(196,168,108,0.12);
      --text: #e8e0d4;
      --muted: #8a8070;
      --dim: #5a5248;
      --line: rgba(196,168,108,0.1);
      --font-d: 'Cormorant Garamond', Georgia, serif;
      --font-b: 'DM Sans', -apple-system, sans-serif;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-bottom: calc(24px + var(--safe-b));
      min-height: 100%;
    }

    .auth {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    /* Logo */
    .auth-logo {
      font-family: var(--font-d);
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text);
      margin-bottom: 48px;
    }

    /* Heading */
    .auth-heading {
      font-family: var(--font-d);
      font-size: 1.6rem;
      font-weight: 400;
      margin-bottom: 32px;
      color: var(--text);
    }

    /* Fields */
    .auth-fields {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .auth-field {
      width: 100%;
      background: var(--field);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px 18px;
      font-family: var(--font-b);
      font-size: 1rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .auth-field:focus {
      border-color: var(--gold);
    }

    .auth-field::placeholder {
      color: var(--dim);
    }

    .auth-field-name {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      margin: 0;
      padding: 0;
      border: none;
      transition: max-height 0.3s ease, opacity 0.3s ease, margin 0.3s ease, padding 0.3s ease, border 0.3s ease;
    }

    .auth-field-name.show {
      max-height: 60px;
      opacity: 1;
      margin: 0;
      padding: 16px 18px;
      border: 1px solid var(--line);
      background: var(--field);
      border-radius: 12px;
      font-family: var(--font-b);
      font-size: 1rem;
      color: var(--text);
      outline: none;
      width: 100%;
    }

    .auth-field-name.show:focus {
      border-color: var(--gold);
    }

    .auth-field-name::placeholder {
      color: var(--dim);
    }

    /* Password wrapper */
    .pass-wrap {
      position: relative;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.3s ease, opacity 0.3s ease;
    }

    .pass-wrap.show {
      max-height: 60px;
      opacity: 1;
    }

    .pass-wrap input {
      width: 100%;
      background: var(--field);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px 48px 16px 18px;
      font-family: var(--font-b);
      font-size: 1rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .pass-wrap input:focus { border-color: var(--gold); }
    .pass-wrap input::placeholder { color: var(--dim); }

    .pass-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--dim);
      padding: 4px;
      display: flex;
    }

    .pass-toggle svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.5; }

    /* Continue button */
    .auth-btn {
      width: 100%;
      padding: 16px;
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      font-family: var(--font-b);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
      position: relative;
    }

    .auth-btn:hover { opacity: 0.9; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-btn .btn-spinner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
    }

    .auth-btn.loading .btn-label { opacity: 0; }
    .auth-btn.loading .btn-spinner { opacity: 1; }

    .btn-spinner-circle {
      width: 20px; height: 20px;
      border: 2px solid rgba(15,13,10,0.3);
      border-top-color: var(--bg);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider */
    .auth-or {
      display: flex;
      align-items: center;
      margin: 20px 0;
      color: var(--dim);
      font-size: 0.85rem;
    }

    .auth-or::before, .auth-or::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .auth-or span { padding: 0 16px; }

    /* Social buttons */
    .auth-social {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .social-btn {
      width: 100%;
      padding: 14px;
      background: var(--field);
      border: 1px solid var(--line);
      border-radius: 12px;
      font-family: var(--font-b);
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .social-btn:hover { border-color: var(--gold); }

    .social-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* Google G icon colors */
    .g-blue { fill: #4285F4; }
    .g-red { fill: #EA4335; }
    .g-yellow { fill: #FBBC05; }
    .g-green { fill: #34A853; }

    /* Toggle */
    .auth-switch {
      margin-top: 28px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .auth-switch a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
    }

    /* Error */
    .auth-error {
      background: rgba(200,80,80,0.1);
      border: 1px solid rgba(200,80,80,0.15);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: #c97a7a;
      text-align: left;
      display: none;
    }

    .auth-error.show { display: block; }

    .auth-error.success {
      background: rgba(196,168,108,0.1);
      border-color: rgba(196,168,108,0.15);
      color: var(--gold);
    }

    /* Forgot + Remember row */
    .auth-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      display: none;
    }

    .auth-row.show { display: flex; }

    .auth-row a {
      font-size: 0.82rem;
      color: var(--gold);
      text-decoration: none;
    }

    .auth-row label {
      font-size: 0.82rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .auth-row input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--gold);
    }
  </style>
</head>
<body>

  <div class="auth">
    <div class="auth-logo">LiveNew</div>
    <h1 class="auth-heading" id="heading">Log in or sign up</h1>

    <div class="auth-error" id="error"></div>

    <div class="auth-fields">
      <input class="auth-field auth-field-name" id="name" type="text" placeholder="Full name" autocomplete="name">
      <input class="auth-field" id="email" type="email" placeholder="Email address" autocomplete="email" inputmode="email">
      <div class="pass-wrap" id="pass-wrap">
        <input id="pass" type="password" placeholder="Password" autocomplete="current-password">
        <button type="button" class="pass-toggle" id="pass-toggle">
          <svg viewBox="0 0 24 24" id="eye-open"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <svg viewBox="0 0 24 24" id="eye-closed" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" stroke-linecap="round" stroke-linejoin="round"/><line x1="1" y1="1" x2="23" y2="23" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

    <div class="auth-row" id="auth-row">
      <a href="#">Forgot password?</a>
      <label>Remember me <input type="checkbox" id="remember"></label>
    </div>

    <button class="auth-btn" id="submit" type="button">
      <span class="btn-label" id="btn-label">Continue</span>
      <div class="btn-spinner"><div class="btn-spinner-circle"></div></div>
    </button>

    <div class="auth-or"><span>or</span></div>

    <div class="auth-social">
      <button class="social-btn" id="google-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path class="g-blue" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path class="g-green" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path class="g-yellow" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path class="g-red" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <button class="social-btn" id="apple-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83"/><path d="M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Continue with Apple
      </button>
    </div>

    <div class="auth-switch">
      <span id="switch-text">Don't have an account?</span>
      <a href="#" id="switch-link">Sign up</a>
    </div>
  </div>

  <script>
    let mode = 'login'; // 'login' or 'signup'
    const heading = document.getElementById('heading');
    const nameField = document.getElementById('name');
    const passWrap = document.getElementById('pass-wrap');
    const btnLabel = document.getElementById('btn-label');
    const switchText = document.getElementById('switch-text');
    const switchLink = document.getElementById('switch-link');
    const submitBtn = document.getElementById('submit');
    const errorEl = document.getElementById('error');
    const authRow = document.getElementById('auth-row');
    const emailField = document.getElementById('email');
    const passField = document.getElementById('pass');

    // Start in signup mode if on signup page
    if (window.location.pathname.includes('signup')) {
      mode = 'signup';
      updateUI();
    } else {
      updateUI();
    }

    function updateUI() {
      if (mode === 'signup') {
        heading.textContent = 'Create your account';
        nameField.classList.add('show');
        passWrap.classList.add('show');
        btnLabel.textContent = 'Create Account';
        switchText.textContent = 'Already have an account?';
        switchLink.textContent = 'Log in';
        authRow.classList.remove('show');
      } else {
        heading.textContent = 'Log in or sign up';
        nameField.classList.remove('show');
        passWrap.classList.add('show');
        btnLabel.textContent = 'Continue';
        switchText.textContent = "Don't have an account?";
        switchLink.textContent = 'Sign up';
        authRow.classList.add('show');
      }
      errorEl.classList.remove('show');
      nameField.value = '';
      emailField.value = '';
      passField.value = '';
    }

    switchLink.addEventListener('click', e => {
      e.preventDefault();
      mode = mode === 'login' ? 'signup' : 'login';
      updateUI();
    });

    // Password toggle
    document.getElementById('pass-toggle').addEventListener('click', () => {
      if (passField.type === 'password') {
        passField.type = 'text';
        document.getElementById('eye-open').style.display = 'none';
        document.getElementById('eye-closed').style.display = 'block';
      } else {
        passField.type = 'password';
        document.getElementById('eye-open').style.display = 'block';
        document.getElementById('eye-closed').style.display = 'none';
      }
    });

    // Submit
    submitBtn.addEventListener('click', async () => {
      const email = emailField.value.trim();
      const password = passField.value;
      const name = nameField.value.trim();

      errorEl.classList.remove('show', 'success');

      if (!email) { showError('Enter your email address.'); return; }
      if (!password) { showError('Enter your password.'); return; }
      if (mode === 'signup' && !name) { showError('Enter your name.'); return; }

      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      try {
        let csrf = null;
        try {
          const r = await fetch('/v1/csrf', { credentials: 'same-origin' });
          const d = await r.json();
          csrf = d?.token || d?.csrfToken || null;
        } catch {}

        const endpoint = mode === 'signup' ? '/v1/auth/signup' : '/v1/auth/login';
        const payload = mode === 'signup' ? { email, password, name, consent: true } : { email, password };
        const headers = { 'Content-Type': 'application/json' };
        if (csrf) headers['X-CSRF-Token'] = csrf;

        const res = await fetch(endpoint, { method: 'POST', headers, credentials: 'same-origin', body: JSON.stringify(payload) });
        const data = await res.json();

        if (!res.ok) {
          if (data.code === 'ACCOUNT_EXISTS') {
            showError('Account already exists.');
            setTimeout(() => { mode = 'login'; updateUI(); emailField.value = email; }, 1500);
            done(); return;
          }
          if (data.code === 'INVALID_CREDENTIALS') { showError('Invalid email or password.'); done(); return; }
          if (data.code === 'EMAIL_NOT_CONFIRMED') { showError('Check your email to confirm your account.', true); done(); return; }
          throw new Error(data.message || 'Something went wrong.');
        }

        if (mode === 'signup' && data.needsEmailConfirm) {
          showError('Check your email to confirm your account.', true);
          done(); return;
        }

        if (data.accessToken) {
          try {
            localStorage.setItem('livenew_access_token', data.accessToken);
            localStorage.setItem('livenew_refresh_token', data.refreshToken || '');
            localStorage.setItem('livenew_token', data.accessToken);
            localStorage.setItem('livenew_refresh', data.refreshToken || '');
            localStorage.setItem('livenew_user', JSON.stringify({ userId: data.userId, email: data.email }));
          } catch {}
        }

        window.location.href = '/day';
      } catch (err) {
        showError(err.message || 'Something went wrong.');
        done();
      }
    });

    function showError(msg, success) {
      errorEl.textContent = msg;
      errorEl.classList.add('show');
      if (success) errorEl.classList.add('success');
    }

    function done() {
      submitBtn.classList.remove('loading');
      submitBtn.disabled = false;
    }

    // Enter key
    document.querySelectorAll('.auth-field, .pass-wrap input').forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') submitBtn.click(); });
    });

    // Social auth
    document.getElementById('google-btn')?.addEventListener('click', () => { window.location.href = '/v1/auth/google'; });
    document.getElementById('apple-btn')?.addEventListener('click', () => { window.location.href = '/v1/auth/apple'; });
  </script>
</body>
</html>
