<!--
  LiveNew — Magic Link template
  Paste into Supabase Dashboard → Authentication → Email Templates → "Magic Link"
  Subject line: Your LiveNew sign-in code

  Supabase template variable used:
    {{ .Token }}   →  the 6-digit numeric OTP

  Note: Even though we don't currently use magic-link sign-in from the app,
  Supabase will still trigger this template if someone hits the magic link
  endpoint (e.g. via the website). Override it with branded code-style copy
  so we have a single coherent voice across every email Supabase sends.
-->
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background:#0f0d0a;padding:48px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <tr>
    <td align="center">
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="480" style="max-width:480px;width:100%;background:#141210;border:1px solid rgba(196,168,108,0.18);border-radius:18px;overflow:hidden;">

        <tr>
          <td align="center" style="padding:32px 32px 8px 32px;">
            <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:3px;color:#c4a86c;text-transform:uppercase;font-weight:600;">
              LiveNew
            </div>
          </td>
        </tr>

        <tr>
          <td align="center" style="padding:24px 32px 8px 32px;">
            <div style="font-family:Georgia,'Times New Roman',serif;font-size:28px;line-height:1.2;color:#e8e0d4;letter-spacing:-0.2px;">
              Your sign-in code
            </div>
          </td>
        </tr>

        <tr>
          <td align="center" style="padding:8px 32px 32px 32px;">
            <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;line-height:1.6;color:#8a8070;">
              Enter this code in the LiveNew app to sign in.
            </div>
          </td>
        </tr>

        <tr>
          <td align="center" style="padding:0 32px 8px 32px;">
            <div style="background:#1a1714;border:1px solid rgba(196,168,108,0.25);border-radius:14px;padding:24px;display:inline-block;min-width:240px;">
              <div style="font-family:'SF Mono','Menlo','Courier New',monospace;font-size:38px;letter-spacing:14px;color:#c4a86c;font-weight:700;">
                {{ .Token }}
              </div>
            </div>
          </td>
        </tr>

        <tr>
          <td align="center" style="padding:16px 32px 32px 32px;">
            <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:12px;color:#8a8070;letter-spacing:0.3px;">
              The code expires in 60 minutes.
            </div>
          </td>
        </tr>

        <tr>
          <td style="padding:0 32px;">
            <div style="border-top:1px solid rgba(196,168,108,0.14);"></div>
          </td>
        </tr>

        <tr>
          <td style="padding:24px 32px 32px 32px;">
            <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:13px;line-height:1.6;color:#8a8070;">
              Didn't request this code? You can ignore this email.
            </div>
          </td>
        </tr>

      </table>

      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="480" style="max-width:480px;width:100%;margin-top:24px;">
        <tr>
          <td align="center" style="padding:0 32px;">
            <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:11px;line-height:1.6;color:#5a5248;letter-spacing:0.3px;">
              LiveNew · Cortisol-aware AI companion for your day<br>
              <a href="https://livenew.app" style="color:#8a8070;text-decoration:none;">livenew.app</a>
              &nbsp;·&nbsp;
              <a href="mailto:support@livenew.app" style="color:#8a8070;text-decoration:none;">support@livenew.app</a>
            </div>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
